name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check careerpilot

      - name: Type check (mypy)
        run: mypy careerpilot/backend/config careerpilot/backend/core || true

      - name: Run tests
        env:
          CAREERPILOT_ENV: testing
        run: pytest --cov=careerpilot --cov-report=term-missing
